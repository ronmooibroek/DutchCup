    }
    
    wrap.appendChild(body);
    return wrap;
}

function buildFooterNav() {
    const wrap = el('div', { class: 'foot-nav' });
    // Pulse the Next button once every score on this hole is in — the obvious next step.
    const round = getRoundById(state.selectedRoundId);
    const gp = getGroupPlayers(round, state.groupNumber);
    const holeDone = holeStatus(round, gp, state.currentHole) === 'complete';
    wrap.appendChild(el('button', {
        class: 'foot-btn prev',
        onclick: () => goToHole(state.currentHole - 1),
        disabled: state.currentHole === 0 ? '' : null
    }, el('span', null, '←'), el('span', null, 'Prev hole')));
    wrap.appendChild(el('button', {
        class: 'foot-btn next' + (holeDone && state.currentHole < 17 ? ' pulse' : ''),
        onclick: () => goToHole(state.currentHole + 1),
        disabled: state.currentHole === 17 ? '' : null
    }, el('span', null, holeDone && state.currentHole < 17 ? 'Hole done — next' : 'Next hole'), el('span', null, '→')));
    return wrap;
}

function goToHole(holeIdx) {
    if (holeIdx < 0 || holeIdx > 17) return;
    if (state.autoAdvanceTimer) { clearTimeout(state.autoAdvanceTimer); state.autoAdvanceTimer = null; }
    if (hasPendingEdits()) {
        if (state.pendingTimer) clearTimeout(state.pendingTimer);
        flushPendingEdits();
    }
    state.currentHole = holeIdx;
    state.sheetPlayerId = null;       // close any open score sheet on hole change
    state.padExpanded = false;
    // This is THE save moment: edits collected on the hole flush now.
    if (hasPendingEdits()) { setStatus('Saving…', 'saving'); flushPendingEdits(); }
    renderScoreEntry();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function computePlayerTotals(round, p) {
    let gross = 0, points = 0, thru = 0;
    const hc = parseInt(p.handicap, 10) || 0;
    for (let h = 0; h < 18; h++) {
        const s = effectiveScore(round, p.id, h);
        if (s === '' || s == null) continue;
        const n = parseInt(s, 10);
        if (isNaN(n)) continue;
        thru++;
        gross += n;
        const par = (round.pars || [])[h];
        const holeHc = (round.handicaps || [])[h];
        const strokes = strokesOnHole(hc, holeHc);
        points += getPoints((n - strokes) - par);
    }
    return { gross, points, thru };
}

// ═══════════════════════════════════════════════════════════════════════
// INPUT HANDLERS
// ═══════════════════════════════════════════════════════════════════════
function onScoreInput(e) {
    const input = e.target;
    const playerId = input.dataset.playerId;
    let val = input.value.trim();
    if (val !== '') {
        const n = parseInt(val, 10);
        if (isNaN(n) || n < 1 || n > 15) {
            // Invalid mid-typing — don't pendingEdit yet, but still don't lose what's there
            return;
        }
        val = String(n);
    }

    if (!state.pendingEdits.scores[playerId]) state.pendingEdits.scores[playerId] = {};
    state.pendingEdits.scores[playerId][state.currentHole] = val;

    updateCellLiveColor(playerId, val);
    updatePlayerTotalsLive();
    updateDotsLive();

    markUnsaved();

    // Auto-advance: 300ms after last keystroke, move focus to next score input on this hole
    if (state.autoAdvanceTimer) clearTimeout(state.autoAdvanceTimer);
    if (val !== '') {
        state.autoAdvanceTimer = setTimeout(() => {
            advanceFocusFrom(input);
        }, 300);
    }
}

function advanceFocusFrom(currentInput) {
    const inputs = Array.from(document.querySelectorAll('.score-input'));
    const idx = inputs.indexOf(currentInput);
    if (idx < 0) return;
    const next = inputs[idx + 1];
    if (!next) return; // last input on this hole — stop here
    // Some browsers preserve the keyboard if focus is moved synchronously.
    // setTimeout 0 to escape current event loop turn helps on iOS.
    next.focus();
    if (next.select) try { next.select(); } catch (_) {}
    // Scroll the next input into view if needed
    try { next.scrollIntoView({ block: 'center', behavior: 'smooth' }); } catch (_) {}
}

function onScoreBlur() {
    if (hasPendingEdits() && !state.saving) {
        if (state.pendingTimer) clearTimeout(state.pendingTimer);
        flushPendingEdits();
    }
}

function onCTPChange(e) {
    state.pendingEdits.ctpWinners[String(state.currentHole)] = e.target.value || '';
    e.target.classList.toggle('has-value', !!e.target.value);
    markUnsaved();
}

function onBBBChange(e) {
    const slot = e.target.dataset.bbbSlot;
    if (!slot) return;
    const h = String(state.currentHole);
    if (!state.pendingEdits.bbb[h]) {
        // Seed from current effective values so we don't lose other slots
        state.pendingEdits.bbb[h] = { ...effectiveBBB(getRoundById(state.selectedRoundId), state.currentHole) };
    }
    state.pendingEdits.bbb[h][slot] = e.target.value || '';
    e.target.classList.toggle('has-value', !!e.target.value);
    markUnsaved();
}

function adjustBalls(playerId, delta) {
    const round = getRoundById(state.selectedRoundId);
    if (!round) return;
    const current = effectiveBalls(round, playerId);
    const next = Math.max(0, Math.min(9, current + delta));
    if (next === current) return;
    state.pendingEdits.balls[idStr(playerId)] = next;

    const row = document.querySelector(`.balls-row[data-player-id="${cssEscape(idStr(playerId))}"]`);
    if (row) {
        row.querySelectorAll('.pip').forEach((p, i) => p.classList.toggle('full', i < next));
        const cnt = row.querySelector('[data-role="balls-count"]');
        if (cnt) cnt.textContent = String(next);
        const btns = row.querySelectorAll('.balls-btn');
        if (btns[0]) btns[0].disabled = (next <= 0);
        if (btns[1]) btns[1].disabled = (next >= 9);
    }

    markUnsaved();
}

function hasPendingEdits() {
    return Object.keys(state.pendingEdits.scores).length > 0
        || Object.keys(state.pendingEdits.ctpWinners).length > 0
        || Object.keys(state.pendingEdits.balls).length > 0
        || Object.keys(state.pendingEdits.bbb).length > 0;
}

// ═══════════════════════════════════════════════════════════════════════
// SAVE — Firestore transaction (last-save-wins)
// ═══════════════════════════════════════════════════════════════════════
// Taps no longer trigger a per-tap save. Edits collect locally and flush on hole
// change (plus app-background and player/round switch), which eliminates the
// tap-during-save race entirely on the course.
function markUnsaved() {
    setStatus('Unsaved \u270e', 'saving');
}

// Remove from pendingEdits exactly the leaf values a successful flush wrote —
// but keep any key the user re-edited while the save was in flight.
function prunePendingEdits(saved) {
    Object.keys(saved.scores || {}).forEach(pid => {
        Object.keys(saved.scores[pid]).forEach(h => {
            if (state.pendingEdits.scores[pid] && state.pendingEdits.scores[pid][h] === saved.scores[pid][h]) {
                delete state.pendingEdits.scores[pid][h];
            }
        });
        if (state.pendingEdits.scores[pid] && Object.keys(state.pendingEdits.scores[pid]).length === 0) {
            delete state.pendingEdits.scores[pid];
        }
    });
    Object.keys(saved.ctpWinners || {}).forEach(h => {
        if (state.pendingEdits.ctpWinners[h] === saved.ctpWinners[h]) delete state.pendingEdits.ctpWinners[h];
    });
    Object.keys(saved.balls || {}).forEach(pid => {
        if (state.pendingEdits.balls[pid] === saved.balls[pid]) delete state.pendingEdits.balls[pid];
    });
    Object.keys(saved.bbb || {}).forEach(h => {
        if (state.pendingEdits.bbb[h] && JSON.stringify(state.pendingEdits.bbb[h]) === JSON.stringify(saved.bbb[h])) {
            delete state.pendingEdits.bbb[h];
        }
    });
}

async function flushPendingEdits() {
    if (state.saving) { state.pendingTimer = setTimeout(flushPendingEdits, 400); return; }
    if (!hasPendingEdits()) { setStatus('', ''); return; }

    // Snapshot WITHOUT clearing. Taps that land while this save is in flight stay in
    // state.pendingEdits (so effective* keeps showing them) and get their own flush.
    // On success we prune only the keys whose values match this snapshot.
    const edits = JSON.parse(JSON.stringify(state.pendingEdits));
    state.saving = true;
    state.pendingTimer = null;

    try {
        await firestoreDb.runTransaction(async (tx) => {
            const snap = await tx.get(roundsRef);
            if (!snap.exists) throw new Error('Rounds doc missing');
            const data = snap.data();
            const rounds = Array.isArray(data.value) ? JSON.parse(JSON.stringify(data.value)) : [];

            const round = rounds.find(r => idsEqual(r.id, state.selectedRoundId));
            if (!round) throw new Error('Round no longer exists');
            // Reject the write if the round has been finalized by the main app since these edits were started.
            // The transaction will throw here; the catch block below puts edits back so the user doesn't lose them
            // (though the round being locked means they're stuck unless reopened in the main app).
            if (round.completed === true) {
                const err = new Error('ROUND_COMPLETED');
                err.code = 'ROUND_COMPLETED';
                throw err;
            }

            // 1) Scores + balls (per-player edits within current group)
            (round.teams || []).forEach(team => {
                (team.players || []).forEach(player => {
                    if (player.groupNumber !== state.groupNumber) return;
                    const pid = idStr(player.id);

                    if (edits.scores[pid]) {
                        if (!Array.isArray(player.scores) || player.scores.length !== 18) {
                            player.scores = Array(18).fill('');
                        }
                        Object.keys(edits.scores[pid]).forEach(h => {
                            player.scores[parseInt(h, 10)] = edits.scores[pid][h];
                        });
                    }
                    if (edits.balls[pid] !== undefined) player.ballsRemaining = edits.balls[pid];
                });
            });

            // 2) CTP edits (last-save-wins; replace any entry for the hole)
            if (Object.keys(edits.ctpWinners).length > 0) {
                if (!Array.isArray(round.ctpWinners)) round.ctpWinners = [];
                Object.keys(edits.ctpWinners).forEach(hStr => {
                    const holeIdx = parseInt(hStr, 10);
                    const winnerId = edits.ctpWinners[hStr];
                    round.ctpWinners = round.ctpWinners.filter(item => {
                        if (item == null) return false;
                        if (typeof item === 'object') {
                            const itemHole = (item.holeIdx != null) ? item.holeIdx
                                          : (item.hole != null) ? (item.hole - 1) : null;
                            return itemHole !== holeIdx;
                        }
                        return true;
                    });
                    if (winnerId) round.ctpWinners.push({ holeIdx, playerId: winnerId });
                });
            }

            // 3) BBB edits (replace any entry for the hole)
            if (Object.keys(edits.bbb).length > 0) {
                if (!Array.isArray(round.bbbAwards)) round.bbbAwards = [];
                Object.keys(edits.bbb).forEach(hStr => {
                    const holeIdx = parseInt(hStr, 10);
                    const slots = edits.bbb[hStr];
                    round.bbbAwards = round.bbbAwards.filter(a => !(a && a.holeIdx === holeIdx));
                    // Only push if at least one slot is set
                    if (slots.bingo || slots.bango || slots.bongo) {
                        round.bbbAwards.push({
                            holeIdx,
                            bingo: slots.bingo || '',
                            bango: slots.bango || '',
                            bongo: slots.bongo || ''
                        });
                    }
                });

                // Recompute every player's bbbTotal as count of awards across all holes
                const counts = {};
                round.bbbAwards.forEach(a => {
                    ['bingo', 'bango', 'bongo'].forEach(slot => {
                        const pid = a[slot];
                        if (pid) counts[idStr(pid)] = (counts[idStr(pid)] || 0) + 1;
                    });
                });
                (round.teams || []).forEach(team => {
                    (team.players || []).forEach(player => {
                        player.bbbTotal = counts[idStr(player.id)] || 0;
                    });
                });
            }

            tx.set(roundsRef, {
                value: rounds,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        });

        state.saving = false;

        // Prune exactly what this flush saved; anything re-edited mid-flight survives.
        prunePendingEdits(edits);

        if (hasPendingEdits()) {
            flushPendingEdits();
        } else {
            setStatus('Saved ✓', 'saved');
            setTimeout(() => {
                if (!state.saving && !hasPendingEdits()) setStatus('', '');
            }, 1500);
        }
    } catch (err) {
        console.error('Save error:', err);
        state.saving = false;
        // If the round was finalized by the main app, stop retrying and notify
        if (err && (err.code === 'ROUND_COMPLETED' || (err.message && err.message.includes('ROUND_COMPLETED')))) {
            setStatus('Round was finalized — edits not saved', 'error');
            // Drop pending edits (they'd never save anyway) and kick back to picker
            state.pendingEdits = { scores: {}, ctpWinners: {}, balls: {}, bbb: {} };
            if (state.pendingTimer) { clearTimeout(state.pendingTimer); state.pendingTimer = null; }
            // Show a brief alert then bounce to the round picker so the now-locked round is gone from view
            setTimeout(() => {
                alert('This round was finalized in the main app. Your latest edits could not be saved.');
                state.selectedRoundId = null;
                state.currentPlayerId = null;
                state.groupNumber = null;
                state.currentHole = 0;
                render();
            }, 100);
            return;
        }
        setStatus('Save failed — retrying', 'error');
        // pendingEdits was never cleared, so everything is still queued — just retry.
        state.pendingTimer = setTimeout(flushPendingEdits, 2500);
    }
}

// ═══════════════════════════════════════════════════════════════════════
// LIVE DOM updates (don't disturb focused input)
// ═══════════════════════════════════════════════════════════════════════
function cssEscape(s) {
    if (window.CSS && window.CSS.escape) return window.CSS.escape(String(s));
    return String(s).replace(/[^a-zA-Z0-9_-]/g, c => '\\' + c);
}

function updateCellLiveColor(playerId, gross) {
    const round = getRoundById(state.selectedRoundId);
    if (!round) return;
    const groupPlayers = getGroupPlayers(round, state.groupNumber);
    const p = groupPlayers.find(x => idsEqual(x.id, playerId));
    if (!p) return;

    const par = (round.pars || [])[state.currentHole];
    const holeHc = (round.handicaps || [])[state.currentHole];
    const hc = parseInt(p.handicap, 10) || 0;
    const strokes = strokesOnHole(hc, holeHc);
    const cls = classForScore(gross, par, strokes);

    const wrap = document.querySelector(`.score-input-wrap[data-player-id="${cssEscape(idStr(playerId))}"]`);
    if (!wrap) return;
    ['albatross','eagle','birdie','par-score','bogey','double','worse'].forEach(c => wrap.classList.remove(c));
    if (cls) wrap.classList.add(cls);

    let badge = wrap.querySelector('.score-pts');
    if (gross !== '' && !isNaN(parseInt(gross, 10))) {
        const n = parseInt(gross, 10);
        const pts = getPoints((n - strokes) - par);
        if (!badge) {
            badge = document.createElement('span');
            badge.className = 'score-pts';
            wrap.appendChild(badge);
        }
        badge.textContent = `${pts}p`;
    } else if (badge) {
        badge.remove();
    }
}

function updatePlayerTotalsLive() {
    const round = getRoundById(state.selectedRoundId);
    if (!round) return;
    const groupPlayers = getGroupPlayers(round, state.groupNumber);
    const rows = document.querySelectorAll('.score-row');
    rows.forEach((row, i) => {
        const p = groupPlayers[i];
        if (!p) return;
        const totals = computePlayerTotals(round, p);
        const meta = row.querySelector('.player-meta .total');
        if (meta) meta.textContent = `Thru ${totals.thru}: ${totals.gross || '—'} (${totals.points} pts)`;
    });
}

function updateDotsLive() {
    const round = getRoundById(state.selectedRoundId);
    if (!round) return;
    const groupPlayers = getGroupPlayers(round, state.groupNumber);
    document.querySelectorAll('#dots-strip .dot').forEach((dot, h) => {
        const status = holeStatus(round, groupPlayers, h);
        dot.classList.remove('complete', 'partial');
        if (status) dot.classList.add(status);
    });
}

function refreshScoreEntryFromServer() {
    const round = getRoundById(state.selectedRoundId);
    if (!round) return;
    const groupPlayers = getGroupPlayers(round, state.groupNumber);

    // Scores — rebuild the score list in place. The tap-based pad has no keyboard focus
    // to preserve, and effectiveScore overlays any pending local edits, so this is safe.
    const oldList = document.getElementById('score-list');
    if (oldList) oldList.replaceWith(buildScoresList(round, groupPlayers));

    // CTP — update the dropdown in place unless the user is mid-selection
    const ctpSel = document.getElementById('ctp-select');
    if (ctpSel && document.activeElement !== ctpSel
        && state.pendingEdits.ctpWinners[String(state.currentHole)] === undefined) {
        const v = idStr(effectiveCTP(round, state.currentHole));
        if (ctpSel.value !== v) ctpSel.value = v;
        ctpSel.classList.toggle('has-value', !!v);
    }
    // (BBB pills live on the score rows, already rebuilt above.)

    // Balls (only present on hole 18)
    if (state.currentHole === 17) {
        groupPlayers.forEach(p => {
            const pid = idStr(p.id);
            if (state.pendingEdits.balls[pid] !== undefined) return;
            const balls = effectiveBalls(round, p.id);
            const row = document.querySelector(`.balls-row[data-player-id="${cssEscape(pid)}"]`);
            if (!row) return;
            row.querySelectorAll('.pip').forEach((pip, i) => pip.classList.toggle('full', i < balls));
            const cnt = row.querySelector('[data-role="balls-count"]');
            if (cnt) cnt.textContent = String(balls);
            const btns = row.querySelectorAll('.balls-btn');
            if (btns[0]) btns[0].disabled = (balls <= 0);
            if (btns[1]) btns[1].disabled = (balls >= 9);
        });
    }

    updatePlayerTotalsLive();
    updateDotsLive();
}

// ─── Photo upload & remove (transactional Firestore updates) ────────────
let _photoUploadingCount = 0;

async function uploadRoundPhotos(fileList) {
    if (!firebaseStorage) {
        setStatus('Photos disabled (Storage not configured)', 'error');
        return;
    }
    if (!fileList || fileList.length === 0) return;
    const roundId = state.selectedRoundId;
    if (!roundId) return;
    
    const files = Array.from(fileList);
    _photoUploadingCount += files.length;
    setStatus(`📸 Uploading ${files.length} photo${files.length === 1 ? '' : 's'}…`, 'saving');
    
    let succeeded = 0;
    let lastErr = null;
    for (let i = 0; i < files.length; i++) {
        const file = files[i];
        try {
            // Compress, then upload to Firebase Storage
            const blob = await compressImage(file, 1200, 0.85);
            const ts = Date.now() + i; // unique even for rapid uploads
            const path = roundPhotoPath(roundId, ts);
            const url = await uploadPhotoBlob(blob, path);
            const entry = { url, path, uploadedAt: ts };
            
            // Transactionally merge this photo into round.photos[]
            await firestoreDb.runTransaction(async (tx) => {
                const snap = await tx.get(roundsRef);
                if (!snap.exists) throw new Error('Rounds doc missing');
                const data = snap.data();
                const rounds = Array.isArray(data.value) ? JSON.parse(JSON.stringify(data.value)) : [];
                const round = rounds.find(r => idsEqual(r.id, roundId));
                if (!round) throw new Error('Round no longer exists');
                if (!Array.isArray(round.photos)) round.photos = [];
                round.photos.push(entry);
                tx.set(roundsRef, {
                    value: rounds,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            });
            succeeded++;
        } catch (err) {
            console.error(`Photo ${i + 1} upload failed:`, err);
            lastErr = err;
        } finally {
            _photoUploadingCount--;
        }
    }
    
    if (succeeded === 0) {
        // Surface the REAL reason so failures are diagnosable on the course.
        const code = lastErr && (lastErr.code || lastErr.name) || '';
        if (code === 'storage/unauthorized' || code === 'storage/unauthenticated') {
            setStatus('Upload blocked — Storage rules expired (check Firebase console)', 'error');
        } else if (code === 'storage/quota-exceeded') {
            setStatus('Upload blocked — Storage quota exceeded', 'error');
        } else if (code === 'storage/retry-limit-exceeded' || code === 'storage/canceled') {
            setStatus('Upload failed — poor connection, try again', 'error');
        } else {
            setStatus('Photo upload failed' + (code ? ` (${code})` : (lastErr && lastErr.message ? ` (${String(lastErr.message).slice(0, 60)})` : '')), 'error');
        }
    } else if (succeeded < files.length) {
        setStatus(`⚠️ ${succeeded} of ${files.length} uploaded`, 'saved');
        setTimeout(() => setStatus('Saved ✓', 'saved'), 2000);
    } else {
        setStatus(`✅ ${succeeded} photo${succeeded === 1 ? '' : 's'} added`, 'saved');
        setTimeout(() => setStatus('Saved ✓', 'saved'), 1500);
    }
    // The snapshot listener will pick up the new photos and re-render
}

async function removeRoundPhoto(index) {
    const roundId = state.selectedRoundId;
    if (!roundId) return;
    const round = getRoundById(roundId);
    if (!round || !Array.isArray(round.photos) || !round.photos[index]) return;
    
    if (!confirm('Remove this photo?')) return;
    
    const photo = round.photos[index];
    const photoPath = (photo && typeof photo === 'object' && photo.path) ? photo.path : null;
    
    setStatus('Removing photo…', 'saving');
    try {
        // 1) Remove from Firestore via transaction
        await firestoreDb.runTransaction(async (tx) => {
            const snap = await tx.get(roundsRef);
            if (!snap.exists) throw new Error('Rounds doc missing');
            const data = snap.data();
            const rounds = Array.isArray(data.value) ? JSON.parse(JSON.stringify(data.value)) : [];
            const r = rounds.find(r => idsEqual(r.id, roundId));
            if (!r) throw new Error('Round no longer exists');
            if (!Array.isArray(r.photos)) return;
            r.photos.splice(index, 1);
            tx.set(roundsRef, {
                value: rounds,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        });
        // 2) Best-effort: delete the file from Storage
        if (photoPath) await deletePhotoAtPath(photoPath);
        setStatus('Photo removed', 'saved');
        setTimeout(() => setStatus('Saved ✓', 'saved'), 1500);
    } catch (err) {
        console.error('Remove photo failed:', err);
        setStatus('Failed to remove photo', 'error');
    }
}

async function togglePhotoTag(index, playerId) {
    const roundId = state.selectedRoundId;
    if (!roundId) return;
    setStatus('Saving tag…', 'saving');
    try {
        await firestoreDb.runTransaction(async (tx) => {
            const snap = await tx.get(roundsRef);
            if (!snap.exists) throw new Error('Rounds doc missing');
            const data = snap.data();
            const rounds = Array.isArray(data.value) ? JSON.parse(JSON.stringify(data.value)) : [];
            const r = rounds.find(r => idsEqual(r.id, roundId));
            if (!r || !Array.isArray(r.photos) || !r.photos[index]) return;
            let photo = r.photos[index];
            // Legacy string photo → object so it can carry tags
            if (typeof photo === 'string') photo = { url: photo };
            if (!Array.isArray(photo.playerIds)) photo.playerIds = [];
            const pos = photo.playerIds.findIndex(id => idsEqual(id, playerId));
            if (pos >= 0) photo.playerIds.splice(pos, 1);
            else photo.playerIds.push(playerId);
            r.photos[index] = photo;
            tx.set(roundsRef, {
                value: rounds,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        });
        setStatus('Tag saved ✓', 'saved');
    } catch (err) {
        console.error('Tag toggle failed:', err);
        setStatus('Failed to save tag', 'error');
    }
}

function onPhotoFileSelected(ev) {
    const input = ev.target;
    if (input.files && input.files.length > 0) {
        uploadRoundPhotos(input.files);
    }
    input.value = ''; // reset so same file can be picked again
}

function togglePhotoCard() {
    const body = document.getElementById('photo-card-body');
    const caret = document.getElementById('photo-card-caret');
    if (!body) return;
    const isOpen = body.style.display !== 'none';
    body.style.display = isOpen ? 'none' : 'block';
    if (caret) caret.textContent = isOpen ? '▶' : '▼';
}

window.addEventListener('beforeunload', (e) => {
    if (hasPendingEdits() && !state.saving) {
        flushPendingEdits();
        e.preventDefault();
        e.returnValue = '';
    }
});

window.__dutchCup = { state, flushPendingEdits, getRoundById };

init();
