                                                    <div style="font-size:28px;font-weight:700;color:#FF9A00;">${totalPoints.toFixed(1)}</div>
                                                    <div style="font-size:11px;color:#6b7280;">${playerStrokePoints} stroke • ${bbbPoints.toFixed(1)} BBB • ${ballPoints} balls${extra9Points > 0 ? ` • ${extra9Points} extra9` : ''}${ctpPoints > 0 ? ` • ${ctpPoints} CTP` : ''}</div>
                                                </div>
                                            </div>
                                            
                                            <!-- Score Grid -->
                                            <div style="display:grid;grid-template-columns:repeat(9,1fr);gap:4px;margin-bottom:8px;">
                                                ${player.scores.slice(0, 9).map((score, holeIdx) => {
                                                    const par = round.pars[holeIdx];
                                                    const holeHandicap = round.handicaps[holeIdx];
                                                    const getsStroke = player.handicap >= holeHandicap;
                                                    const colors = getScoreColor(score, par, getsStroke);
                                                    
                                                    // Calculate points
                                                    let points = 0;
                                                    if (score !== '' && score !== null && score !== undefined) {
                                                        const netScore = parseInt(score) - (getsStroke ? 1 : 0);
                                                        const netToPar = netScore - par;
                                                        points = getPoints(netToPar);
                                                    }
                                                    
                                                    const borderStyle = getsStroke ? 'border:3px solid #3b82f6;' : 'border:2px solid #d1d5db;';
                                                    
                                                    return `
                                                        <div style="text-align:center;">
                                                            <div style="font-size:10px;color:#6b7280;font-weight:600;margin-bottom:2px;">${holeIdx + 1}</div>
                                                            <div style="${borderStyle}background:${colors.bg};color:${colors.text};padding:8px 4px;border-radius:4px;font-weight:${colors.fontWeight};font-size:14px;">
                                                                ${score || '-'}
                                                            </div>
                                                            <div style="font-size:9px;color:#9ca3af;margin-top:2px;">${par}</div>
                                                            <div style="font-size:9px;color:${points > 0 ? '#059669' : '#dc2626'};font-weight:600;min-height:12px;">
                                                                ${points !== 0 ? (points > 0 ? '+' : '') + points : ''}
                                                            </div>
                                                        </div>
                                                    `;
                                                }).join('')}
                                            </div>
                                            
                                            <div style="display:grid;grid-template-columns:repeat(9,1fr);gap:4px;">
                                                ${player.scores.slice(9, 18).map((score, holeIdx) => {
                                                    const actualHoleIdx = holeIdx + 9;
                                                    const par = round.pars[actualHoleIdx];
                                                    const holeHandicap = round.handicaps[actualHoleIdx];
                                                    const getsStroke = player.handicap >= holeHandicap;
                                                    const colors = getScoreColor(score, par, getsStroke);
                                                    
                                                    // Calculate points
                                                    let points = 0;
                                                    if (score !== '' && score !== null && score !== undefined) {
                                                        const netScore = parseInt(score) - (getsStroke ? 1 : 0);
                                                        const netToPar = netScore - par;
                                                        points = getPoints(netToPar);
                                                    }
                                                    
                                                    const borderStyle = getsStroke ? 'border:3px solid #3b82f6;' : 'border:2px solid #d1d5db;';
                                                    
                                                    return `
                                                        <div style="text-align:center;">
                                                            <div style="font-size:10px;color:#6b7280;font-weight:600;margin-bottom:2px;">${actualHoleIdx + 1}</div>
                                                            <div style="${borderStyle}background:${colors.bg};color:${colors.text};padding:8px 4px;border-radius:4px;font-weight:${colors.fontWeight};font-size:14px;">
                                                                ${score || '-'}
                                                            </div>
                                                            <div style="font-size:9px;color:#9ca3af;margin-top:2px;">${par}</div>
                                                            <div style="font-size:9px;color:${points > 0 ? '#059669' : '#dc2626'};font-weight:600;min-height:12px;">
                                                                ${points !== 0 ? (points > 0 ? '+' : '') + points : ''}
                                                            </div>
                                                        </div>
                                                    `;
                                                }).join('')}
                                            </div>
                                            
                                            <!-- Player Stats Breakdown -->
                                            <div style="background:white;border-radius:8px;padding:12px;margin-top:12px;">
                                                <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;">
                                                    <div style="text-align:center;padding:8px;background:#f0fdf4;border-radius:6px;">
                                                        <div style="font-size:10px;color:#065f46;font-weight:600;margin-bottom:4px;">⛳ STROKES</div>
                                                        <div style="font-size:20px;font-weight:700;color:#059669;">${playerStrokePoints}</div>
                                                        <div style="font-size:9px;color:#6b7280;">points</div>
                                                    </div>
                                                    
                                                    <div style="text-align:center;padding:8px;background:#faf5ff;border-radius:6px;">
                                                        <div style="font-size:10px;color:#6b21a8;font-weight:600;margin-bottom:4px;">🎯 BBB</div>
                                                        <div style="font-size:20px;font-weight:700;color:#8b5cf6;">${bbbPoints.toFixed(1)}</div>
                                                        <div style="font-size:9px;color:#6b7280;">${player.bbbTotal || 0} × ${state.settings.bbbPoints}</div>
                                                    </div>
                                                    
                                                    <div style="text-align:center;padding:8px;background:#fffbeb;border-radius:6px;">
                                                        <div style="font-size:10px;color:#92400e;font-weight:600;margin-bottom:4px;">⚪ BALLS</div>
                                                        <div style="font-size:20px;font-weight:700;color:#d97706;">${ballPoints}</div>
                                                        <div style="font-size:9px;color:#6b7280;">${player.ballsRemaining || 0} × ${state.settings.ballPoints}</div>
                                                    </div>
                                                    
                                                    <div style="text-align:center;padding:8px;background:#eff6ff;border-radius:6px;">
                                                        <div style="font-size:10px;color:#1e40af;font-weight:600;margin-bottom:4px;">🎯 CTP</div>
                                                        <div style="font-size:20px;font-weight:700;color:#3b82f6;">${ctpPoints}</div>
                                                        <div style="font-size:9px;color:#6b7280;">${ctpPoints > 0 ? (ctpPoints / state.settings.ctpPoints) + ' wins' : 'none'}</div>
                                                    </div>
                                                    
                                                    <div style="text-align:center;padding:8px;background:#fef2f2;border-radius:6px;">
                                                        <div style="font-size:10px;color:#991b1b;font-weight:600;margin-bottom:4px;">🏆 EXTRA 9</div>
                                                        <div style="font-size:20px;font-weight:700;color:#dc2626;">${extra9Points}</div>
                                                        <div style="font-size:9px;color:#6b7280;">${extra9Points > 0 ? (extra9Points / state.settings.extra9Points) + ' wins' : 'none'}</div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                                
                                <!-- Team Summary -->
                                ${(() => {
                                    // Calculate team totals for each category
                                    const teamStrokePoints = team.players.reduce((sum, p) => {
                                        return sum + calcPlayerTotal(p.scores, round.pars, round.handicaps, p.handicap);
                                    }, 0);
                                    
                                    const teamBBBPoints = team.players.reduce((sum, p) => {
                                        return sum + ((p.bbbTotal || 0) * state.settings.bbbPoints);
                                    }, 0);
                                    
                                    const teamBallPoints = team.players.reduce((sum, p) => {
                                        return sum + ((p.ballsRemaining || 0) * state.settings.ballPoints);
                                    }, 0);
                                    
                                    // Calculate team CTP points
                                    let teamCTPPoints = 0;
                                    if (round.ctpWinners && round.ctpWinners.length > 0) {
                                        const teamIndex = round.teams.indexOf(team);
                                        teamCTPPoints = round.ctpWinners.filter(w => w.startsWith(`${teamIndex}-`)).length * state.settings.ctpPoints;
                                    }
                                    
                                    // Calculate team Extra 9 points
                                    let teamExtra9Points = 0;
                                    if (round.extra9Winners && round.extra9Winners.length > 0) {
                                        const teamIndex = round.teams.indexOf(team);
                                        teamExtra9Points = round.extra9Winners.filter(w => w.startsWith(`${teamIndex}-`)).length * state.settings.extra9Points;
                                    }
                                    
                                    // Calculate correct team total from categories
                                    const correctTeamTotal = teamStrokePoints + teamBBBPoints + teamBallPoints + teamCTPPoints + teamExtra9Points;
                                    
                                    return `
                                        <div style="background:linear-gradient(135deg,#FF9A00,#ea580c);color:white;border-radius:12px;padding:20px;margin-top:20px;">
                                            <h3 style="margin:0 0 16px 0;font-size:20px;">Team Total: ${correctTeamTotal.toFixed(1)} Points</h3>
                                            <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;">
                                                <div style="background:rgba(255,255,255,0.2);padding:12px;border-radius:8px;text-align:center;">
                                                    <div style="font-size:11px;opacity:0.9;margin-bottom:4px;">⛳ Strokes</div>
                                                    <div style="font-size:24px;font-weight:700;">${teamStrokePoints}</div>
                                                </div>
                                                <div style="background:rgba(255,255,255,0.2);padding:12px;border-radius:8px;text-align:center;">
                                                    <div style="font-size:11px;opacity:0.9;margin-bottom:4px;">🎯 BBB</div>
                                                    <div style="font-size:24px;font-weight:700;">${teamBBBPoints.toFixed(1)}</div>
                                                </div>
                                                <div style="background:rgba(255,255,255,0.2);padding:12px;border-radius:8px;text-align:center;">
                                                    <div style="font-size:11px;opacity:0.9;margin-bottom:4px;">⚪ Balls</div>
                                                    <div style="font-size:24px;font-weight:700;">${teamBallPoints}</div>
                                                </div>
                                                <div style="background:rgba(255,255,255,0.2);padding:12px;border-radius:8px;text-align:center;">
                                                    <div style="font-size:11px;opacity:0.9;margin-bottom:4px;">🎯 CTP</div>
                                                    <div style="font-size:24px;font-weight:700;">${teamCTPPoints}</div>
                                                </div>
                                                <div style="background:rgba(255,255,255,0.2);padding:12px;border-radius:8px;text-align:center;">
                                                    <div style="font-size:11px;opacity:0.9;margin-bottom:4px;">🏆 Extra 9</div>
                                                    <div style="font-size:24px;font-weight:700;">${teamExtra9Points}</div>
                                                </div>
                                            </div>
                                        </div>
                                    `;
                                })()}
                                
                                <div style="text-align:center;margin-top:20px;">
                                    <button onclick="navigate('leaderboard')" class="btn-primary" style="background:#6b7280;padding:12px 24px;">
                                        ← Back to Leaderboard
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                
                app.innerHTML = html;
            } catch (err) {
                console.error('Show team scorecard error:', err);
                showError('Failed to show scorecard: ' + err.message);
            }
        };

        window.deleteAllRounds = () => {
            try {
                if (state.rounds.length === 0) {
                    showError('No rounds to delete!');
                    return;
                }
                
                // Show custom confirmation dialog
                const app = document.getElementById('app');
                app.innerHTML = `
                    <div class="card" style="margin-top:40px;">
                        <h2 style="color:#ef4444;">⚠️ DELETE ALL ROUNDS?</h2>
                        <div style="background:#fee2e2;padding:20px;border-radius:8px;margin:20px 0;">
                            <p style="font-size:20px;font-weight:700;margin-bottom:16px;color:#991b1b;">
                                This will permanently delete ${state.rounds.length} round${state.rounds.length === 1 ? '' : 's'}!
                            </p>
                            <p style="color:#7f1d1d;margin-bottom:8px;">• Clear the entire leaderboard</p>
                            <p style="color:#7f1d1d;margin-bottom:8px;">• Remove all round history</p>
                            <p style="color:#7f1d1d;margin-bottom:8px;">• Reset all team scores to 0</p>
                            <p style="font-weight:700;color:#991b1b;margin-top:16px;">THIS CANNOT BE UNDONE!</p>
                        </div>
                        <div style="display:flex;gap:12px;">
                            <button onclick="navigate('leaderboard')" class="btn-primary" style="flex:1;background:#6b7280;">
                                ← Cancel
                            </button>
                            <button onclick="confirmDeleteAllRounds()" class="btn-primary" style="flex:1;background:#ef4444;">
                                🗑️ Yes, Delete Everything
                            </button>
                        </div>
                    </div>
                `;
            } catch (err) {
                console.error('Delete all rounds error:', err);
                showError('Failed to delete rounds: ' + err.message);
            }
        };

        window.confirmDeleteAllRounds = () => {
            try {
                save('rounds', []);
                notify('✅ All rounds deleted!');
                navigate('leaderboard');
            } catch (err) {
                console.error('Delete all rounds error:', err);
                showError('Failed to delete rounds: ' + err.message);
            }
        };

        window.saveSettings = () => {
            try {
                const parseOrDefault = (id, defaultValue) => {
                    const value = parseFloat(document.getElementById(id).value);
                    return isNaN(value) ? defaultValue : value;
                };
                
                state.settings = {
                    albatrossPoints: parseOrDefault('albatrossPoints', 10),
                    eaglePoints: parseOrDefault('eaglePoints', 7),
                    birdiePoints: parseOrDefault('birdiePoints', 5),
                    parPoints: parseOrDefault('parPoints', 2),
                    bogeyPoints: parseOrDefault('bogeyPoints', 1),
                    doubleBogeyPoints: parseOrDefault('doubleBogeyPoints', 0),
                    bbbPoints: parseOrDefault('bbbPoints', 1),
                    ballPoints: parseOrDefault('ballPoints', 1),
                    extra9Points: parseOrDefault('extra9Points', 5),
                    ctpPoints: parseOrDefault('ctpPoints', 2)
                };
                save('settings', state.settings);
                notify('✅ Settings saved!');
                navigate('home');
            } catch (err) {
                console.error('Save settings error:', err);
                showError('Failed to save settings: ' + err.message);
            }
        };

        window.resetSettings = () => {
            try {
                if (!confirm('Reset all point values to defaults?')) return;
                
                state.settings = {
                    albatrossPoints: 10,
                    eaglePoints: 7,
                    birdiePoints: 5,
                    parPoints: 2,
                    bogeyPoints: 1,
                    doubleBogeyPoints: 0,
                    bbbPoints: 1,
                    ballPoints: 1,
                    extra9Points: 5,
                    ctpPoints: 2
                };
                save('settings', state.settings);
                notify('✅ Settings reset!');
                render();
            } catch (err) {
                console.error('Reset settings error:', err);
                showError('Failed to reset settings: ' + err.message);
            }
        };

        window.recalculateAllRounds = () => {
            try {
                if (state.rounds.length === 0) {
                    showError('No rounds to recalculate!');
                    return;
                }
                
                // Show custom confirmation dialog
                const app = document.getElementById('app');
                app.innerHTML = `
                    <div class="card" style="margin-top:40px;">
                        <h2 style="color:#818cf8;">🔄 Recalculate All Rounds?</h2>
                        <div style="background:#e0e7ff;padding:20px;border-radius:8px;margin:20px 0;">
                            <p style="font-size:18px;font-weight:600;margin-bottom:16px;color:#3730a3;">
                                Recalculate ${state.rounds.length} round${state.rounds.length === 1 ? '' : 's'} using current point values
                            </p>
                            <p style="color:#4338ca;margin-bottom:8px;"><strong>Current Settings:</strong></p>
                            <p style="color:#4338ca;margin-bottom:4px;">• Birdie: ${state.settings.birdiePoints} pts</p>
                            <p style="color:#4338ca;margin-bottom:4px;">• Par: ${state.settings.parPoints} pts</p>
                            <p style="color:#4338ca;margin-bottom:4px;">• Bogey: ${state.settings.bogeyPoints} pts</p>
                            <p style="color:#4338ca;margin-bottom:4px;">• BBB: ${state.settings.bbbPoints} pts</p>
                            <p style="color:#4338ca;margin-bottom:16px;">• Ball: ${state.settings.ballPoints} pts</p>
                            <p style="font-weight:600;color:#3730a3;">This will update all team totals and leaderboard standings.</p>
                        </div>
                        <div style="display:flex;gap:12px;">
                            <button onclick="navigate('settings')" class="btn-primary" style="flex:1;background:#6b7280;">
                                ← Cancel
                            </button>
                            <button onclick="confirmRecalculateAllRounds()" class="btn-primary" style="flex:1;background:#818cf8;">
                                🔄 Yes, Recalculate
                            </button>
                        </div>
                    </div>
                `;
            } catch (err) {
                console.error('Recalculate rounds error:', err);
                showError('Failed to show recalculate dialog: ' + err.message);
            }
        };

        window.confirmRecalculateAllRounds = () => {
            try {
                const updatedRounds = state.rounds.map(round => {
                    const updatedTeams = round.teams.map(team => {
                        let totalPoints = 0;
                        
                        team.players.forEach(player => {
                            totalPoints += calcPlayerTotal(player.scores, round.pars, round.handicaps, player.handicap);
                            totalPoints += (player.bbbTotal || 0) * state.settings.bbbPoints;
                            totalPoints += (player.ballsRemaining || 0) * state.settings.ballPoints;
                        });
                        
                        return { ...team, totalPoints: totalPoints };
                    });
                    
                    return { ...round, teams: updatedTeams };
                });
                
                save('rounds', updatedRounds);
                notify(`✅ Recalculated ${state.rounds.length} rounds!`);
                navigate('settings');
            } catch (err) {
                console.error('Confirm recalculate error:', err);
                showError('Failed to recalculate rounds: ' + err.message);
            }
        };

        // Initialize
        console.log('========================================');
        console.log('Golf League Tracker v7.99 - Firebase Edition');
        console.log('✅ Firebase Firestore database integration');
        console.log('✅ Real-time data sync across devices');
        console.log('✅ Multi-league support via LEAGUE_ID');
        console.log('✅ LocalStorage fallback');
        console.log('========================================');
        
        // Load data from database (async)
        loadData().then(() => {
            // Show helpful message if no data
            if (state.players.length === 0 && state.courses.length === 0) {
                setTimeout(() => {
                    const dbType = useFirebase ? 'Firebase (cloud sync enabled! 🌐)' : 'LocalStorage (local only)';
                    alert(`👋 Welcome to Golf League v7.99!\\n\\nDatabase: ${dbType}\\nLeague ID: ${LEAGUE_ID}\\n\\nTo get started:\\n1. Add Players (Admin → Players)\\n2. Add a Course (Admin → Courses)\\n3. Create Teams (Admin → Teams)\\n4. Start a Round!`);
                }, 500);
            } else {
                const dbType = useFirebase ? '☁️ Firebase' : '💾 LocalStorage';
                notify(`✅ v7.99 Ready! (${dbType})`);
            }
        });
    </script>
</body>
</html>
