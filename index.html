<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#FF9A00">
    <title>Golf League Tracker</title>
    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiR29sZiBMZWFndWUiLCJzaG9ydF9uYW1lIjoiR29sZiIsInN0YXJ0X3VybCI6Ii4iLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjZmZmZmZmIiwidGhlbWVfY29sb3IiOiIjZjk3MzE2In0=">
    
    <!-- Firebase SDK - Latest version -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #FFB84D 0%, #FF9A00 100%);
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 80px;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 24px;
            padding: 20px;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 8px;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #FF9A00;
            margin-bottom: 16px;
            font-size: 24px;
        }
        
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .list-item:hover {
            background: #f9fafb;
            transform: translateY(-2px);
        }
        
        .btn-primary {
            background: #FF9A00;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary:hover {
            background: #ea580c;
        }
        
        .btn-secondary {
            background: #6b7280;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .back-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 16px;
        }
        
        .score-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 4px;
            margin-bottom: 8px;
        }
        
        .score-input {
            width: 100%;
            padding: 8px 4px;
            border-radius: 6px;
            text-align: center;
            font-size: 16px;
            font-weight: 700;
        }
        
        .score-input:focus {
            outline: none;
            border-color: #FF9A00;
        }
        
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            display: none;
            z-index: 1000;
        }
        
        .points-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 11px;
        }
        
        .pts-birdie { background: #d1fae5; color: #065f46; }
        .pts-par { background: #dbeafe; color: #1e40af; }
        .pts-bogey { background: #f3f4f6; color: #374151; }
        .pts-0 { background: #fee2e2; color: #b91c1c; }
    </style>
</head>
<body>
    <div class="header">
        <div style="display:flex;align-items:center;justify-content:space-between;">
            <div style="font-size:48px;">🇳🇱</div>
            <h1 id="headerTitle" style="margin:0;flex:1;text-align:center;">Golf League</h1>
            <div style="font-size:48px;">🇨🇦</div>
        </div>
    </div>
    
    <div id="app"></div>
    <div id="toast"></div>
    
    <script>
        // =====================================================================
        // FIREBASE CONFIGURATION
        // =====================================================================
        // TO SET UP FIREBASE:
        // 1. Go to https://console.firebase.google.com/
        // 2. Create a new project (or use existing)
        // 3. Click "Add app" → Choose "Web" (</> icon)
        // 4. Register your app and copy the config object below
        // 5. Enable Firestore Database in Firebase Console
        // 6. Set Firestore rules to allow read/write (see instructions below)
        //
        // FIRESTORE SECURITY RULES (for testing - update for production):
        // Go to Firestore → Rules → Replace with:
        /*
        rules_version = '2';
        service cloud.firestore {
          match /databases/{database}/documents {
            match /leagues/{leagueId}/{document=**} {
              allow read, write: if true;  // For testing only!
            }
          }
        }
        */
        // For production, add authentication and restrict access
        // =====================================================================
        
        const firebaseConfig = {
            apiKey: "AIzaSyBNc104mTZIwHbg4tYUhYNv3n2GS6Z1Ijo",
            authDomain: "dutchcup.firebaseapp.com",
            projectId: "dutchcup",
            storageBucket: "dutchcup.firebasestorage.app",
            messagingSenderId: "643789311462",
            appId: "1:643789311462:web:cfd7fc01ccf4a0171b9a27",
            measurementId: "G-YMP33N5C55"
        };
        
        // League ID - all users in the same league use the same ID
        // Change this to create different leagues
        // Example: "spring-2024", "summer-league", "mooibroek-golf", etc.
        const LEAGUE_ID = "dutch-cup-2024";
        
        // Initialize Firebase (if config is valid)
        let firebaseApp = null;
        let firestoreDb = null;
        let useFirebase = false;
        
        try {
            // Check if Firebase SDK is loaded
            if (typeof firebase === 'undefined') {
                console.log('⚠️ Firebase SDK not loaded - using localStorage');
                console.log('📝 Make sure you have internet connection or check the Firebase CDN URLs');
                useFirebase = false;
            } else if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
                firebaseApp = firebase.initializeApp(firebaseConfig);
                firestoreDb = firebase.firestore();
                useFirebase = true;
                console.log('✅ Firebase initialized successfully');
                console.log('📊 League ID:', LEAGUE_ID);
            } else {
                console.log('⚠️ Firebase not configured - using localStorage');
                console.log('📝 See comments in code for setup instructions');
            }
        } catch (error) {
            console.error('❌ Firebase initialization error:', error);
            console.log('⚠️ Falling back to localStorage');
            useFirebase = false;
        }
        
        // Database helpers
        const db = {
            // Get data from Firebase or localStorage
            get: async (key) => {
                if (useFirebase && firestoreDb) {
                    try {
                        const doc = await firestoreDb
                            .collection('leagues')
                            .doc(LEAGUE_ID)
                            .collection('data')
                            .doc(key)
                            .get();
                        
                        if (doc.exists) {
                            return doc.data().value;
                        }
                        return null;
                    } catch (error) {
                        console.error('Firebase get error:', error);
                        // Fallback to localStorage
                        return db.getLocal(key);
                    }
                } else {
                    return db.getLocal(key);
                }
            },
            
            // Set data to Firebase or localStorage
            set: async (key, value) => {
                // Always save to localStorage as backup
                db.setLocal(key, value);
                
                if (useFirebase && firestoreDb) {
                    try {
                        await firestoreDb
                            .collection('leagues')
                            .doc(LEAGUE_ID)
                            .collection('data')
                            .doc(key)
                            .set({
                                value: value,
                                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                            });
                        return true;
                    } catch (error) {
                        console.error('Firebase set error:', error);
                        return false;
                    }
                }
                return true;
            },
            
            // LocalStorage fallback methods
            getLocal: (key) => {
                try {
                    const data = localStorage.getItem(key);
                    return data ? JSON.parse(data) : null;
                } catch (e) {
                    console.error('LocalStorage get error:', e);
                    return null;
                }
            },
            
            setLocal: (key, value) => {
                try {
                    localStorage.setItem(key, JSON.stringify(value));
                    return true;
                } catch (e) {
                    console.error('LocalStorage set error:', e);
                    return false;
                }
            },
            
            // Listen to real-time updates from Firebase
            listen: (key, callback) => {
                if (useFirebase && firestoreDb) {
                    return firestoreDb
                        .collection('leagues')
                        .doc(LEAGUE_ID)
                        .collection('data')
                        .doc(key)
                        .onSnapshot((doc) => {
                            if (doc.exists) {
                                callback(doc.data().value);
                            }
                        }, (error) => {
                            console.error('Firebase listen error:', error);
                        });
                }
                return null;
            }
        };
        
        // Initialize state - will be loaded async
        const state = {
            view: 'home',
            courses: [],
            teams: [],
            players: [],
            rounds: [],
            events: [],
            currentEventId: null,
            activeRound: null,
            selectedCourseId: null,
            selectedTeamIds: [],
            isAuthenticated: false,
            readOnly: true, // Start in read-only mode - require admin login to edit
            settings: {
                albatrossPoints: 10,
                eaglePoints: 7,
                birdiePoints: 5,
                parPoints: 2,
                bogeyPoints: 1,
                doubleBogeyPoints: 0,
                bbbPoints: 1,
                ballPoints: 1,
                extra9Points: 5,
                ctpPoints: 2
            },
            dataLoaded: false
        };
        
        // Load data from database (async)
        async function loadData() {
            console.log('Loading data...');
            
            try {
                state.courses = await db.get('courses') || [];
                state.teams = await db.get('teams') || [];
                state.players = await db.get('players') || [];
                state.rounds = await db.get('rounds') || [];
                state.events = await db.get('events') || [];
                state.currentEventId = await db.get('currentEventId') || null;
                state.settings = await db.get('settings') || state.settings;
                
                state.dataLoaded = true;
                console.log('✅ Data loaded successfully');
                
                // Validate and migrate data
                validateAndMigrateData();
                
                // Initial render
                render();
                
                // Setup real-time listeners if using Firebase
                if (useFirebase) {
                    setupRealtimeListeners();
                }
            } catch (error) {
                console.error('Error loading data:', error);
                state.dataLoaded = true;
                render();
            }
        }
        
        // Setup real-time data sync
        function setupRealtimeListeners() {
            console.log('Setting up real-time sync...');
            
            db.listen('courses', (value) => {
                if (value) {
                    state.courses = value;
                    render();
                }
            });
            
            db.listen('teams', (value) => {
                if (value) {
                    state.teams = value;
                    render();
                }
            });
            
            db.listen('players', (value) => {
                if (value) {
                    state.players = value;
                    render();
                }
            });
            
            db.listen('rounds', (value) => {
                if (value) {
                    state.rounds = value;
                    render();
                }
            });
            
            db.listen('events', (value) => {
                if (value) {
                    state.events = value;
                    render();
                }
            });
            
            db.listen('currentEventId', (value) => {
                state.currentEventId = value;
                render();
            });
            
            db.listen('settings', (value) => {
                if (value) {
                    state.settings = value;
                    render();
                }
            });
        }
        
        // Validate and migrate data
        function validateAndMigrateData() {
            console.log('Validating data...');
            
            // Ensure all arrays exist
            if (!Array.isArray(state.courses)) state.courses = [];
            if (!Array.isArray(state.teams)) state.teams = [];
            if (!Array.isArray(state.players)) state.players = [];
            if (!Array.isArray(state.rounds)) state.rounds = [];
            if (!Array.isArray(state.events)) state.events = [];
            
            // Migrate old rounds without eventId to default event
            if (state.rounds.length > 0 && state.events.length === 0) {
                console.log('Migrating rounds to default event...');
                const defaultEvent = {
                    id: Date.now(),
                    name: 'Season 1',
                description: 'Default event for existing rounds',
                startDate: new Date().toISOString().split('T')[0],
                isActive: true
            };
            state.events.push(defaultEvent);
            state.currentEventId = defaultEvent.id;
            
            // Add eventId to all existing rounds
            state.rounds = state.rounds.map(round => ({
                ...round,
                eventId: defaultEvent.id
            }));
            
            // Use db.set directly (save function not defined yet)
            db.set('events', state.events);
            db.set('currentEventId', state.currentEventId);
            db.set('rounds', state.rounds);
        }
        
        // Set current event if none selected but events exist
        if (!state.currentEventId && state.events.length > 0) {
            state.currentEventId = state.events[0].id;
            db.set('currentEventId', state.currentEventId);
        }
        
        // Fix any teams with invalid players array
        state.teams = state.teams.map(team => {
            if (!team.players || !Array.isArray(team.players)) {
                console.warn('Fixing team with invalid players:', team.name);
                team.players = [];
            }
            return team;
        });
        
        // Save cleaned data
        if (state.teams.length > 0) {
            db.set('teams', state.teams);
        }
        
        console.log('Data validation complete');
        console.log('Players:', state.players.length);
        console.log('Courses:', state.courses.length);
        console.log('Teams:', state.teams.length);
        console.log('Events:', state.events.length);
        console.log('Current Event:', state.currentEventId);

        // Migrate settings for new point types
        if (!state.settings.albatrossPoints) {
            console.log('Migrating settings to include new score types...');
            state.settings.albatrossPoints = 10;
            state.settings.eaglePoints = 7;
            state.settings.doubleBogeyPoints = 0;
            db.set('settings', state.settings);
        }
        
        if (!state.settings.extra9Points) {
            console.log('Migrating settings to include extra 9 points...');
            state.settings.extra9Points = 5;
            db.set('settings', state.settings);
        }
        
        if (!state.settings.ctpPoints) {
            console.log('Migrating settings to include CTP points...');
            state.settings.ctpPoints = 2;
            db.set('settings', state.settings);
        }
    }

        // Save helper
        const save = (key, value) => {
            state[key] = value;
            db.set(key, value);
        };

        // Toast notification
        const notify = (message) => {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        };

        const showError = (message) => {
            alert('❌ ' + message);
        };
        
        // Calculate player handicap details from best 10 of last 20 rounds
        const calculatePlayerHandicapDetails = (playerOrId) => {
            // Support both player object and player ID
            const player = typeof playerOrId === 'object' ? playerOrId : state.players.find(p => p.id === playerOrId);
            if (!player) return { handicap: 0, rounds: [], usedRounds: [] };
            
            // Gather all scores (historic only - event rounds are already in historic)
            const allScores = [];
            
            // Add historic scores
            if (player.historicScores && player.historicScores.length > 0) {
                player.historicScores.forEach(hs => {
                    const course = state.courses.find(c => c.id === hs.courseId);
                    if (course) {
                        const coursePar = course.pars.reduce((sum, p) => sum + p, 0);
                        allScores.push({
                            overPar: hs.grossScore - coursePar,
                            date: hs.date || 0,
                            courseName: course.name,
                            grossScore: hs.grossScore,
                            par: coursePar,
                            handicap: hs.handicap || null,
                            isHistoric: true
                        });
                    }
                });
            }
            
            // If no scores, return default
            if (allScores.length === 0) {
                return { 
                    handicap: player.handicap || 0, 
                    rounds: [], 
                    usedRounds: [],
                    calculation: 'No rounds available'
                };
            }
            
            // Sort by date (newest first) and take last 20
            allScores.sort((a, b) => b.date - a.date);
            const last20 = allScores.slice(0, 20);
            
            // Calculate average over par from all last 20 scores
            const sumOverPar = last20.reduce((sum, s) => sum + s.overPar, 0);
            const avgOverPar = sumOverPar / last20.length;
            
            // Handicap is 80% of average over par, rounded
            const calculatedHandicap = Math.round(avgOverPar * 0.80);
            
            // All rounds in last 20 are used for calculation
            const roundsWithUsedFlag = last20.map(r => ({
                ...r,
                used: true
            }));
            
            return {
                handicap: Math.max(0, Math.min(36, calculatedHandicap)),
                rounds: roundsWithUsedFlag,
                usedRounds: last20,
                totalRounds: allScores.length,
                avgOverPar: avgOverPar,
                sumOverPar: sumOverPar,
                calculation: `Last ${last20.length}: Sum ${sumOverPar} ÷ ${last20.length} = ${avgOverPar.toFixed(1)}, × 0.80 = ${calculatedHandicap}`
            };
        };
        
        // Simple wrapper to get just the handicap number
        const calculatePlayerHandicap = (playerId) => {
            return calculatePlayerHandicapDetails(playerId).handicap;
        };
        
        const showHandicapSummary = (handicapChanges) => {
            const app = document.getElementById('app');
            
            let html = `
                <div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;" onclick="closeHandicapSummary()">
                    <div style="background:white;border-radius:12px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 25px -5px rgba(0,0,0,0.3);" onclick="event.stopPropagation()">
                        <div style="background:linear-gradient(135deg,#10b981,#059669);color:white;padding:20px;border-radius:12px 12px 0 0;">
                            <h2 style="margin:0;font-size:24px;">✅ Round Saved!</h2>
                            <p style="margin:8px 0 0;opacity:0.9;">Handicap Updates</p>
                        </div>
                        
                        <div style="padding:20px;">
            `;
            
            handicapChanges.forEach(change => {
                const diff = change.afterHandicap - change.beforeHandicap;
                const isDrop = diff < 0;
                const isIncrease = diff > 0;
                const isNoChange = diff === 0;
                
                let bgColor = '#f3f4f6';
                let borderColor = '#d1d5db';
                let arrowIcon = '➡️';
                let diffText = 'No change';
                let diffColor = '#6b7280';
                
                if (isDrop) {
                    bgColor = '#d1fae5';
                    borderColor = '#10b981';
                    arrowIcon = '⬇️';
                    diffText = `${Math.abs(diff)} lower`;
                    diffColor = '#059669';
                } else if (isIncrease) {
                    bgColor = '#fee2e2';
                    borderColor = '#ef4444';
                    arrowIcon = '⬆️';
                    diffText = `${diff} higher`;
                    diffColor = '#dc2626';
                }
                
                html += `
                    <div style="background:${bgColor};border:2px solid ${borderColor};border-radius:12px;padding:16px;margin-bottom:12px;">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                            <strong style="font-size:18px;">${change.playerName}</strong>
                            <div style="display:flex;align-items:center;gap:8px;">
                                <span style="font-size:14px;color:#6b7280;font-weight:600;">${diffText}</span>
                            </div>
                        </div>
                        
                        <div style="display:flex;align-items:center;gap:16px;">
                            <div style="text-align:center;">
                                <div style="font-size:12px;color:#6b7280;margin-bottom:4px;">Before</div>
                                <div style="font-size:32px;font-weight:700;color:#374151;">${change.beforeHandicap}</div>
                            </div>
                            
                            <div style="font-size:32px;">${arrowIcon}</div>
                            
                            <div style="text-align:center;">
                                <div style="font-size:12px;color:#6b7280;margin-bottom:4px;">After</div>
                                <div style="font-size:32px;font-weight:700;color:${diffColor};">${change.afterHandicap}</div>
                            </div>
                            
                            ${!isNoChange ? `
                                <div style="flex:1;">
                                    <div style="background:white;border-radius:8px;padding:8px;text-align:center;">
                                        <div style="font-size:24px;font-weight:700;color:${diffColor};">${diff > 0 ? '+' : ''}${diff}</div>
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                        
                        ${!isNoChange ? `
                            <div style="margin-top:12px;height:8px;background:#e5e7eb;border-radius:4px;overflow:hidden;">
                                <div style="height:100%;background:${isDrop ? '#10b981' : '#ef4444'};width:${Math.min(100, Math.abs(diff) * 10)}%;transition:width 0.5s;"></div>
                            </div>
                        ` : ''}
                    </div>
                `;
            });
            
            html += `
                        </div>
                        
                        <div style="padding:0 20px 20px;">
                            <button onclick="closeHandicapSummary()" class="btn-primary" style="width:100%;font-size:16px;padding:16px;">
                                ✅ Continue
                            </button>
                        </div>
                    </div>
                </div>
            `;
            
            app.innerHTML += html;
        };
        
        window.closeHandicapSummary = () => {
            navigate('leaderboard');
        };
        
        const showBBBError = (invalidGroups) => {
            const app = document.getElementById('app');
            
            let html = `
                <div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;">
                    <div style="background:white;border-radius:12px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 25px -5px rgba(0,0,0,0.3);">
                        <div style="background:#dc2626;color:white;padding:20px;border-radius:12px 12px 0 0;">
                            <h2 style="margin:0;font-size:24px;">⚠️ BBB VALIDATION ERROR</h2>
                            <p style="margin:8px 0 0;opacity:0.9;">Found ${invalidGroups.length} group${invalidGroups.length > 1 ? 's' : ''} with incorrect BBB totals</p>
                        </div>
                        
                        <div style="padding:20px;">
            `;
            
            invalidGroups.forEach((g, idx) => {
                html += `
                    <div style="background:${idx % 2 === 0 ? '#fef2f2' : '#fff7ed'};padding:20px;border-radius:8px;margin-bottom:16px;border-left:4px solid #dc2626;">
                        <h3 style="margin:0 0 12px;color:#991b1b;font-size:20px;">❌ GROUP ${g.group}</h3>

                if (isNaN(score) || scores[i] === '' || scores[i] === null || scores[i] === undefined) continue;
                
                const par = pars[i];
                const holeHandicap = handicaps[i];
                const strokes = playerHandicap >= holeHandicap ? 1 : 0;
                const netScore = score - strokes;
                const netToPar = netScore - par;
                
                const pts = getPoints(netToPar);
                total += pts;
            }
            return total;

            if (netToPar === 0) return state.settings.parPoints;
            if (netToPar === 1) return state.settings.bogeyPoints;

        const renderGroupSetup = () => {

            // Initialize selectedPlayers if not exists
            if (!state.selectedPlayers) {
                state.selectedPlayers = new Set();
            }
            
            // Flatten all players from all teams
            const allPlayers = [];
            round.teams.forEach((team, teamIdx) => {
                team.players.forEach((player, playerIdx) => {
                    allPlayers.push({
                        teamIdx,
                        playerIdx,
                        teamName: team.teamName,
                        playerName: player.name,
                        handicap: player.handicap,
                        groupNumber: player.groupNumber || null,
                        key: `${teamIdx}-${playerIdx}`

                });
            });
            
            // Determine number of groups needed (total players / 4, rounded up)
            const numGroups = Math.ceil(allPlayers.length / 4);
            
            // Organize players by group
            const unassigned = allPlayers.filter(p => !p.groupNumber);

            const isEditingScheduled = state.editingScheduledRoundIndex !== undefined;
            
            app.innerHTML = `

                <div class="card">

                        <select id="groupSetupCourseSelect" onchange="changeCourseInGroupSetup()" 
                                style="width:100%;padding:12px;border:2px solid #10b981;border-radius:8px;font-size:16px;background:white;">
                            ${state.courses.map(c => `
                                <option value="${c.id}" ${c.id === round.courseId ? 'selected' : ''}>
                                    ${c.name}
                                </option>

                    <p style="color:#6b7280;margin-bottom:20px;">

                        ${state.selectedPlayers.size > 0 ? `<br><span style="color:#0ea5e9;">✓ ${state.selectedPlayers.size} player${state.selectedPlayers.size === 1 ? '' : 's'} selected</span>` : ''}

                    <div style="display:grid;grid-template-columns:1fr 2fr;gap:20px;">

                                         data-player="${p.playerIdx}"
                                         style="background:${isSelected ? '#dbeafe' : 'white'};padding:12px;margin-bottom:8px;border-radius:6px;cursor:move;border:2px solid ${isSelected ? '#0ea5e9' : '#e5e7eb'};">
                                        ${isSelected ? '<div style="position:absolute;top:4px;right:4px;width:20px;height:20px;background:#0ea5e9;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;">✓</div>' : ''}
                                        <strong>${p.playerName}</strong><br>
                                        <small style="color:#6b7280;">Team: ${p.teamName} • HC: ${p.handicap}</small>

                                                         class="draggable-player"
                                                         data-team="${p.teamIdx}"
                                                         data-player="${p.playerIdx}"
                                                         style="position:relative;background:${isSelected ? '#dbeafe' : 'white'};padding:8px;margin-bottom:6px;border-radius:4px;cursor:move;border:2px solid ${isSelected ? '#0ea5e9' : '#10b981'};">
                                                        ${isSelected ? '<div style="position:absolute;top:4px;right:4px;width:18px;height:18px;background:#0ea5e9;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;">✓</div>' : ''}
                                                        <strong style="font-size:14px;">${p.playerName}</strong><br>

        const renderScoreEntry = () => {
            try {
                if (!state.activeRound) return;
                
                const app = document.getElementById('app');
                const round = state.activeRound;
                
                let html = `
                    <button class="back-btn" onclick="if(confirm('${round.isEditing ? 'Save changes?' : 'Save round?'}')) finishRound(); else navigate('home');">← Back</button>
                    <div class="card">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                            <div>
                                ${round.isEditing ? '<span style="background:#fef3c7;color:#92400e;padding:4px 8px;border-radius:6px;font-size:11px;font-weight:700;margin-right:8px;">EDITING</span>' : ''}
                                <h2 style="margin:0;">${round.courseName}</h2>
                                <small>${round.date}</small>
                            </div>
                            <div style="display:flex;gap:8px;">
                                <button class="btn-secondary" style="width:auto;padding:12px 16px;background:#6366f1;color:white;" onclick="fillTestData()">🧪 Test Data</button>
                                <button class="btn-primary" style="width:auto;padding:12px 24px;" onclick="finishRound()">${round.isEditing ? '💾 Update' : '💾 Finish'}</button>
                            </div>
                        </div>
                    </div>
                `;
                
                // Group players by their individual group numbers
                const playersByGroup = {};
                round.teams.forEach((team, teamIdx) => {
                    team.players.forEach((player, playerIdx) => {
                        const groupNum = player.groupNumber || 'unassigned';
                        if (!playersByGroup[groupNum]) {
                            playersByGroup[groupNum] = [];
                        }
                        playersByGroup[groupNum].push({
                            teamIdx,
                            playerIdx,
                            teamName: team.teamName,
                            teamId: team.teamId,
                            player
                        });
                    });
                });
                
                // Render players grouped by group number
                const sortedGroupKeys = Object.keys(playersByGroup).sort((a, b) => {
                    if (a === 'unassigned') return 1;
                    if (b === 'unassigned') return -1;
                    return parseInt(a) - parseInt(b);
                });
                
                sortedGroupKeys.forEach(groupKey => {
                    // Add group header
                    if (groupKey !== 'unassigned') {
                        html += `
                            <div style="background:linear-gradient(135deg,#8b5cf6,#6366f1);padding:20px;border-radius:12px;margin:24px 0 16px 0;text-align:center;box-shadow:0 4px 6px rgba(0,0,0,0.1);">
                                <h2 style="margin:0;color:white;font-size:24px;font-weight:700;">🏌️ GROUP ${groupKey}</h2>
                                <p style="margin:8px 0 0 0;color:#e9d5ff;font-size:14px;">Foursome ${groupKey}</p>
                            </div>
                        `;
                    }
                    
                    // Render players in this group
                    playersByGroup[groupKey].forEach(({ teamIdx, playerIdx, teamName, player }) => {
                        const strokePlayPoints = calcPlayerTotal(player.scores, round.pars, round.handicaps, player.handicap);
                        const bbbPoints = (player.bbbTotal || 0) * state.settings.bbbPoints;
                        const ballsRemaining = player.ballsRemaining || 0;
                        const ballPoints = ballsRemaining * state.settings.ballPoints;
                        
                        // Calculate Extra 9 points - count how many times this player won
                        let extra9Points = 0;
                        if (round.extra9Winners && round.extra9Winners.length > 0) {
                            const playerIdString = `${teamIdx}-${playerIdx}`;
                            extra9Points = round.extra9Winners.filter(w => w === playerIdString).length * state.settings.extra9Points;
                        }
                        
                        // Calculate CTP points for this player
                        let ctpPoints = 0;
                        if (round.ctpWinners && round.ctpWinners.length > 0) {
                            const playerIdString = `${teamIdx}-${playerIdx}`;
                            ctpPoints = round.ctpWinners.filter(w => w === playerIdString).length * state.settings.ctpPoints;
                        }
                        
                        const grandTotal = strokePlayPoints + bbbPoints + ballPoints + extra9Points + ctpPoints;
                        
                        // Calculate gross score total
                        const grossTotal = player.scores.reduce((sum, score) => {
                            return sum + (parseInt(score) || 0);
                        }, 0);
                        const holesPlayed = player.scores.filter(s => s).length;
                        
                        html += `
                            <div class="card" style="border-left:4px solid ${groupKey !== 'unassigned' ? '#8b5cf6' : '#d1d5db'};">
                            <div style="padding:16px;background:#f9fafb;border-radius:12px;">
                                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                                    <div>
                                        <strong style="font-size:18px;">${player.name}</strong>
                                        <small style="display:block;color:#6b7280;">Team: ${teamName} • Handicap: ${player.handicap} • Gross: ${grossTotal}${holesPlayed < 18 ? ` (${holesPlayed} holes)` : ''}</small>
                                    </div>
                                    <div style="text-align:right;display:flex;align-items:center;gap:8px;">
                                        <button onclick="recalculateScore(${teamIdx}, ${playerIdx})" 
                                                style="background:#3b82f6;color:white;border:none;padding:6px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;">
                                            🔄 Recalc
                                        </button>
                                        <div>

        const renderLeaderboard = () => {

                // Filter rounds by current event (only active/completed rounds, not scheduled)
                const currentEvent = state.events.find(e => e.id === state.currentEventId);
                const eventRounds = state.rounds.filter(r => r.eventId === state.currentEventId && r.active !== false);
                
                eventRounds.forEach((r, rIdx) => {
                    r.teams.forEach(t => {
                        if (!stats[t.teamId]) {

                                id: t.teamId,

                                points: 0, 
                                rounds: 0, 
                                wins: 0,

                                bbbPoints: 0,

                        // Track individual player contributions
                        t.players.forEach(p => {

                // Calculate wins by recalculating team totals for each round

                            let extra9Points = 0;

                            let ctpPoints = 0;

                                ctpPoints = r.ctpWinners.filter(w => w === playerPosition).length * state.settings.ctpPoints;
                            }
                            
                            teamTotal += strokePoints + bbbPoints + ballPoints + extra9Points + ctpPoints;
                        });
                        roundTotals[t.teamId] = teamTotal;

                    const maxTotal = Math.max(...Object.values(roundTotals));
                    Object.keys(roundTotals).forEach(teamId => {

                const leaderboard = Object.values(stats)

                app.innerHTML = `
                    <button class="back-btn" onclick="navigate('home')">← Back</button>
                    <div class="card" style="padding:12px;">
                        <h2 style="margin:0 0 8px;">🏆 Leaderboard</h2>
                        ${currentEvent ? `

                        ${eventRounds.length > 0 ? `

                                    return `

                                        <div style="background:rgba(255,255,255,0.5);padding:6px;border-radius:4px;">
                                            <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px;">
                                                <div style="background:white;padding:4px;border-radius:3px;text-align:center;">
                                                    <div style="font-size:12px;color:#059669;font-weight:600;">⛳</div>
                                                    <div style="font-size:20px;font-weight:700;color:#FF9A00;">${team.strokePoints.toFixed(1)}</div>
                                                </div>
                                                <div style="background:white;padding:4px;border-radius:3px;text-align:center;">

                                                    <div style="font-size:20px;font-weight:700;color:#FF9A00;">${team.bbbPoints.toFixed(1)}</div>
                                                </div>
                                                <div style="background:white;padding:4px;border-radius:3px;text-align:center;">
                                                    <div style="font-size:12px;color:#ca8a04;font-weight:600;">⚪</div>
                                                    <div style="font-size:20px;font-weight:700;color:#FF9A00;">${team.ballPoints.toFixed(1)}</div>
                                                </div>
                                                <div style="background:white;padding:4px;border-radius:3px;text-align:center;">
                                                    <div style="font-size:12px;color:#0284c7;font-weight:600;">🎯</div>
                                                    <div style="font-size:20px;font-weight:700;color:#FF9A00;">${team.ctpPoints.toFixed(1)}</div>
                                                </div>
                                                <div style="background:white;padding:4px;border-radius:3px;text-align:center;">
                                                    <div style="font-size:12px;color:#dc2626;font-weight:600;">🏆</div>
                                                    <div style="font-size:20px;font-weight:700;color:#FF9A00;">${team.extra9Points.toFixed(1)}</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                `}).join('')}
                            </div>
                            
                            ${(() => {
                                // Win Probability Calculation (no graph)
                                const scheduledRounds = state.rounds.filter(r => 
                                    r.eventId === state.currentEventId && 
                                    r.active === false
                                );
                                
                                if (scheduledRounds.length === 0 || eventRounds.length === 0) return '';
                                
                                // Helper for normal distribution random
                                const normalRandom = (mean, stdDev) => {
                                    const u1 = Math.random();
                                    const u2 = Math.random();
                                    const z0 = Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
                                    return z0 * stdDev + mean;
                                };
                                
                                // Calculate team statistics
                                const teamStats = {};
                                Object.keys(stats).forEach(teamId => {
                                    const team = stats[teamId];
                                    const stateTeam = state.teams.find(t => t.id === parseInt(teamId));
                                    
                                    // Calculate average handicap for this team
                                    let avgHandicap = 18;
                                    if (stateTeam && stateTeam.players) {
                                        const teamPlayers = stateTeam.players
                                            .map(pid => state.players.find(p => p.id === pid))
                                            .filter(p => p);
                                        if (teamPlayers.length > 0) {
                                            avgHandicap = teamPlayers.reduce((sum, p) => sum + (p.handicap || 18), 0) / teamPlayers.length;
                                        }
                                    }
                                    
                                    // Get historical points for this team
                                    const pointsHistory = [];
                                    eventRounds.forEach(round => {
                                        const teamInRound = round.teams.find(t => t.teamId === parseInt(teamId));
                                        if (teamInRound) {
                                            pointsHistory.push(teamInRound.totalPoints || 0);
                                        }
                                    });
                                    
                                    const historicalMean = pointsHistory.reduce((a, b) => a + b, 0) / pointsHistory.length;
                                    
                                    // Handicap-based standard deviation model
                                    const handicapBasedStdDev = 15 + (avgHandicap * 0.8);
                                    
                                    let finalStdDev = handicapBasedStdDev;
                                    
                                    // Blend with historical data if we have enough rounds
                                    if (pointsHistory.length >= 2) {
                                        const variance = pointsHistory.reduce((sum, pts) => 
                                            sum + Math.pow(pts - historicalMean, 2), 0
                                        ) / pointsHistory.length;
                                        const historicalStdDev = Math.sqrt(variance);
                                        
                                        // Weight increases with more data (max 50% weight at 5+ rounds)
                                        const weight = Math.min(0.5, pointsHistory.length * 0.1);
                                        finalStdDev = handicapBasedStdDev * (1 - weight) + historicalStdDev * weight;
                                        
                                        // Safety minimum
                                        if (finalStdDev < 10) finalStdDev = 10;
                                    }
                                    
                                    teamStats[teamId] = {
                                        name: team.name,
                                        currentPoints: team.points,
                                        avgPerRound: historicalMean,
                                        stdDev: finalStdDev,
                                        avgHandicap: avgHandicap,
                                        color: stateTeam && stateTeam.color ? stateTeam.color : '#3b82f6'
                                    };
                                });
                                
                                // Monte Carlo simulation
                                const numSimulations = 10000;
                                const remainingRounds = scheduledRounds.length;
                                const winCounts = {};
                                
                                for (let sim = 0; sim < numSimulations; sim++) {
                                    const finalTotals = {};
                                    
                                    Object.keys(teamStats).forEach(teamId => {
                                        const team = teamStats[teamId];
                                        let projectedTotal = team.currentPoints;
                                        
                                        // Simulate remaining rounds
                                        for (let r = 0; r < remainingRounds; r++) {
                                            const simulatedScore = normalRandom(team.avgPerRound, team.stdDev);
                                            projectedTotal += Math.max(0, simulatedScore);
                                        }
                                        
                                        finalTotals[teamId] = projectedTotal;
                                    });
                                    
                                    // Find winner of this simulation
                                    const winnerTeamId = Object.keys(finalTotals).reduce((a, b) =>
                                        finalTotals[a] > finalTotals[b] ? a : b
                                    );
                                    
                                    winCounts[winnerTeamId] = (winCounts[winnerTeamId] || 0) + 1;
                                }
                                
                                // Calculate probabilities and build display

        const arrayToCSV = (data) => {
            if (!data || data.length === 0) return '';
            
            const headers = Object.keys(data[0]);
            const rows = data.map(obj => 
                headers.map(header => {
                    const value = obj[header];
                    // Handle arrays and objects - convert to JSON and then treat as string
                    let strValue;
                    if (Array.isArray(value) || (typeof value === 'object' && value !== null)) {
                        strValue = JSON.stringify(value);
                    } else {
                        // Properly handle false, 0, and other falsy values
                        strValue = value !== null && value !== undefined ? String(value) : '';
                    }
                    // Escape quotes and wrap in quotes if contains comma, quote, or newline
                    return strValue.includes(',') || strValue.includes('"') || strValue.includes('\n')
                        ? `"${strValue.replace(/"/g, '""')}"`
                        : strValue;
                }).join(',')
            );
            
            return [headers.join(','), ...rows].join('\n');
        };

                // Create blob with BOM for Excel compatibility
                const BOM = '\uFEFF';
                const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
                
                // IE11 and Edge legacy
                if (window.navigator && window.navigator.msSaveOrOpenBlob) {
                    console.log('Using IE11 method');
                    window.navigator.msSaveOrOpenBlob(blob, filename);
                    notify('✅ Downloaded: ' + filename);
                    return;
                }
                
                // Modern browsers
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = filename;
                
                // Must append to body for Firefox
                document.body.appendChild(link);
                
                console.log('Link created, triggering download...');
                
                // Click the link
                link.click();
                
                console.log('Download triggered');
                
                // Cleanup after a delay
                setTimeout(() => {
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                    console.log('Cleanup complete');
                }, 1000);
                
                notify('✅ File ready! Check your Downloads folder for: ' + filename);
                
            } catch (err) {
                console.error('Download error:', err);
                
                // If download fails, offer manual copy
                showDownloadFallback(filename, csvContent);
            }

                    navigator.clipboard.writeText(text);

                }
                
                // Fallback for older browsers
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                
                const success = document.execCommand('copy');
                document.body.removeChild(textarea);

        const parseCSV = (csvText) => {
            const lines = csvText.trim().split('\n');
            console.log('parseCSV: total lines:', lines.length);
            if (lines.length < 2) {
                console.log('parseCSV: not enough lines');
                return [];
            }
            
            const headers = lines[0].split(',').map(h => h.trim());
            console.log('parseCSV: headers:', headers);
            const result = [];
            
            for (let i = 1; i < lines.length; i++) {
                console.log(`parseCSV: parsing line ${i}:`, lines[i].substring(0, 100));
                const values = parseCSVLine(lines[i]);
                console.log(`parseCSV: got ${values.length} values, need ${headers.length}`);
                
                if (values.length > 0) {
                    const obj = {};
                    headers.forEach((header, idx) => {
                        let value = values[idx] || '';
                        // Try to parse numbers (but not if it looks like an ID or has leading zeros)
                        if (value && !isNaN(value) && value.length < 15) {
                            obj[header] = Number(value);
                        } else {
                            obj[header] = value;
                        }
                    });
                    
                    // Only add if we got at least an id or name
                    if (obj.id || obj.name) {
                        result.push(obj);
                        console.log('parseCSV: added object:', obj.name || obj.id);
                    } else {
                        console.log('parseCSV: SKIPPED line - no id or name');
                    }
                } else {
                    console.log(`parseCSV: SKIPPED line ${i} - no values parsed`);
                }
            }
            
            console.log('parseCSV: returning', result.length, 'items');
            return result;
        };

        const parseCSVLine = (line) => {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                const nextChar = line[i + 1];
                
                if (char === '"' && inQuotes && nextChar === '"') {
                    current += '"';
                    i++; // Skip next quote
                } else if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            
            return result;
        };
